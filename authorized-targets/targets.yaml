# Authorized Targets - ZENTRALE Whitelist fuer das Toolkit
#
# Jedes aktive Script prueft hier nach. Targets die nicht hier stehen werden
# vom Toolkit verweigert. Eintrag wird per substring match gegen das uebergebene
# Target geprueft.
#
# Eintragsformat (jedes Feld optional):
#   - id: kurzer-name
#     scope: IP/Range/Hostname/SSID/BSSID
#     type: own_device | own_network | wifi_ssid | wifi_bssid | lab | engagement | ctf
#     valid_until: 2026-12-31     # ISO date, leer = unbegrenzt
#     authorization: doku-pfad oder freitext
#     notes: freitext
#
# WICHTIG:
# - Eintraege NUR fuer Ziele wo schriftliche/dokumentierte Erlaubnis vorliegt
# - Bei beruflichen Engagements: Scope-PDF nach authorized-targets/engagements/
# - Nach Abschluss eines Engagements: Eintrag wieder entfernen

